AWSTemplateFormatVersion: '2010-09-09'
Description: ECR Repository for the AI Job Application Agent Docker image

Resources:
  JobAgentRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: job-application-agent
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 3 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 3
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  RepositoryUri:
    Description: ECR Repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/job-application-agent"
    Export:
      Name: JobAgentECRUri
